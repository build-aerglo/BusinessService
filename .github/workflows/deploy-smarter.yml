name: Build and Deploy .NET App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      PROJECT_PATH: ./BusinessService.Api/BusinessService.Api.csproj
      FTP_SERVER_DIR: /root/home/mdeeokoye-002/www/site2/wwwroot/

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify project file exists
        run: |
          if [ ! -f "$PROJECT_PATH" ]; then
            echo "Project file not found. Aborting deploy."
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore $PROJECT_PATH

      - name: Build
        run: dotnet build $PROJECT_PATH --configuration Release --no-restore

      - name: Run tests
        run: dotnet test $PROJECT_PATH --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish $PROJECT_PATH -c Release -o publish

      - name: Validate publish output
        run: |
          if [ ! "$(ls -A publish)" ]; then
            echo "Publish folder is empty. Aborting deploy."
            exit 1
          fi

      # =========================================================
      # PUT SITE IN MAINTENANCE MODE
      # =========================================================
      - name: Upload app_offline.htm via curl
        run: |
          echo "Site updating. Please wait..." > app_offline.htm
          curl --ftp-create-dirs -T app_offline.htm \
            ftp://${{ secrets.SMARTER_FTP_SERVER }}${{ env.FTP_SERVER_DIR }}app_offline.htm \
            --user "${{ secrets.SMARTER_FTP_USERNAME }}:${{ secrets.SMARTER_FTP_PASSWORD }}"

      # =========================================================
      # DEPLOY APPLICATION FILES
      # =========================================================
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SMARTER_FTP_SERVER }}
          username: ${{ secrets.SMARTER_FTP_USERNAME }}
          password: ${{ secrets.SMARTER_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./publish/
          server-dir: ${{ env.FTP_SERVER_DIR }}

      # =========================================================
      # REMOVE MAINTENANCE MODE
      # =========================================================
      - name: Remove local app_offline.htm
        run: rm app_offline.htm

      - name: Delete remote app_offline.htm
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SMARTER_FTP_SERVER }}
          username: ${{ secrets.SMARTER_FTP_USERNAME }}
          password: ${{ secrets.SMARTER_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./publish/
          server-dir: ${{ env.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **
            !app_offline.htm
